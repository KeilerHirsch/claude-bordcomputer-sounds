<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Claude Bordcomputer Sounds maps Claude Code hook events to Star-Trek-style acoustic signals so you hear what Claude is doing without watching the terminal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bluePanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2436"/><stop offset="1" stop-color="#101a24"/>
    </linearGradient>
    <linearGradient id="amberPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e2411"/><stop offset="1" stop-color="#1b1810"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="640" rx="26" fill="url(#bg)"/>

  <!-- Header -->
  <text x="64" y="66" fill="#38bdf8" font-size="20" font-weight="700" letter-spacing="3">CLAUDE CODE · ACOUSTIC HOOKS</text>
  <text x="64" y="120" fill="#f1f5f9" font-size="45" font-weight="800">Hear what Claude is doing</text>
  <text x="64" y="152" fill="#94a3b8" font-size="19">Star-Trek-style ship's-computer signals — for when you run Claude in auto-accept and tab away.</text>

  <!-- EVENT MAP panel -->
  <rect x="64" y="188" width="640" height="368" rx="18" fill="url(#bluePanel)" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="64" y="188" width="640" height="6" rx="3" fill="#38bdf8"/>
  <text x="92" y="230" fill="#7dd3fc" font-size="17" font-weight="700" letter-spacing="2">HOOK EVENT → SOUND</text>

  <g font-size="18">
    <circle cx="104" cy="271" r="5" fill="#22c55e"/><text x="122" y="277" fill="#e2e8f0">turn finished</text><text x="330" y="277" fill="#4ade80" font-weight="600">done blip</text>
    <circle cx="104" cy="309" r="5" fill="#f59e0b"/><text x="122" y="315" fill="#e2e8f0">needs your input</text><text x="330" y="315" fill="#fbbf24" font-weight="600">attention chirp</text>
    <circle cx="104" cy="347" r="5" fill="#38bdf8"/><text x="122" y="353" fill="#e2e8f0">session start</text><text x="330" y="353" fill="#7dd3fc" font-weight="600">deep power-up</text>
    <circle cx="104" cy="385" r="5" fill="#a78bfa"/><text x="122" y="391" fill="#e2e8f0">skill runs</text><text x="330" y="391" fill="#c4b5fd" font-weight="600">themed voice</text>
    <circle cx="104" cy="423" r="5" fill="#2dd4bf"/><text x="122" y="429" fill="#e2e8f0">memory write</text><text x="330" y="429" fill="#5eead4" font-weight="600">"regeneration cycle complete"</text>
    <circle cx="104" cy="461" r="5" fill="#fb923c"/><text x="122" y="467" fill="#e2e8f0">blocked action</text><text x="330" y="467" fill="#fdba74" font-weight="600">"authorization required"</text>
    <circle cx="104" cy="499" r="5" fill="#ef4444"/><text x="122" y="505" fill="#e2e8f0">dangerous action</text><text x="330" y="505" fill="#f87171" font-weight="600">Red Alert</text>
  </g>

  <!-- WHY panel -->
  <rect x="736" y="188" width="480" height="368" rx="18" fill="url(#amberPanel)" stroke="#f59e0b" stroke-opacity="0.45" stroke-width="1.5"/>
  <rect x="736" y="188" width="480" height="6" rx="3" fill="#f59e0b"/>
  <text x="764" y="230" fill="#fbbf24" font-size="17" font-weight="700" letter-spacing="2">WHY IT WORKS</text>

  <text x="764" y="276" fill="#fde9c7" font-size="19" font-weight="700">You don't watch every step.</text>
  <text x="764" y="308" fill="#e2e8f0" font-size="17">But you still want to know the</text>
  <text x="764" y="332" fill="#e2e8f0" font-size="17">moment Claude is <tspan fill="#4ade80" font-weight="700">done</tspan> or <tspan fill="#fbbf24" font-weight="700">needs you</tspan>.</text>

  <g font-size="17" fill="#fde9c7">
    <circle cx="772" cy="378" r="4" fill="#f59e0b"/><text x="788" y="384">No dependencies</text>
    <circle cx="772" cy="410" r="4" fill="#f59e0b"/><text x="788" y="416">Pure Python + native OS audio</text>
    <circle cx="772" cy="442" r="4" fill="#f59e0b"/><text x="788" y="448">Windows / macOS / Linux</text>
    <circle cx="772" cy="474" r="4" fill="#f59e0b"/><text x="788" y="480">Fork &amp; remap — just file-stems</text>
  </g>

  <!-- Footer -->
  <rect x="64" y="582" width="1152" height="34" rx="10" fill="#0b1220" stroke="#334155" stroke-width="1"/>
  <text x="88" y="604" fill="#cbd5e1" font-size="14">
    <tspan font-weight="700" fill="#38bdf8">A real, working example</tspan> of how far Claude Code hooks go — not a toy. Swap sounds, remap skills, delete what you don't want · GPLv3
  </text>
</svg>

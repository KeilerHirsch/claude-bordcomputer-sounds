  <text x="1236" y="52" fill="#6e7681" font-size="15" text-anchor="end">bordcomputer v1.0.1</text><text x="56" y="118" font-size="19"><tspan fill="#3fb950">gsoc@katana</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~/dev/bordcomputer-sounds</tspan><tspan fill="#8b949e">$ </tspan><tspan fill="#e6edf3">bordcomputer --arm</tspan></text><text x="56" y="164" fill="#c9d1d9" font-size="18">&#9656; map hook events</text><text x="640" y="164" fill="#39c5cf" font-size="18">done &#183; attention &#183; alert</text><text x="56" y="200" fill="#c9d1d9" font-size="18">&#9656; themed voice pack</text><rect x="640" y="183" width="90" height="24" rx="5" fill="#238636"/><text x="685.0" y="200" fill="#e6edf3" text-anchor="middle" font-size="14" font-weight="700">loaded</text><text x="56" y="236" fill="#c9d1d9" font-size="18">&#9656; memory-write chime</text><rect x="640" y="219" width="80" height="24" rx="5" fill="#238636"/><text x="680.0" y="236" fill="#e6edf3" text-anchor="middle" font-size="14" font-weight="700">wired</text><text x="56" y="272" fill="#c9d1d9" font-size="18">&#9656; Red Alert</text><text x="640" y="272" fill="#e6edf3" font-size="18">on error</text><text x="56" y="322" fill="#8b949e" font-size="15" letter-spacing="1">// your terminal should talk back like a bridge</text><text x="56" y="384" font-size="34" font-weight="800"><tspan fill="#f85149">silent</tspan><tspan fill="#6e7681" font-size="25">  &#9472;&#9472;&#9654;  </tspan><tspan fill="#3fb950">audible</tspan><tspan fill="#8b949e" font-size="18" font-weight="600">  every hook event</tspan></text><text x="56" y="436" font-size="19"><tspan fill="#3fb950" font-weight="700">&#10003; Star-Trek signals  &#183;  done &#183; attention &#183; Red Alert</tspan></text><text x="56" y="466" font-size="16" fill="#6e7681">hear your agent work &#8212; no more staring at a silent terminal.</text><text x="56" y="512" font-size="19"><tspan fill="#3fb950">gsoc@katana</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58
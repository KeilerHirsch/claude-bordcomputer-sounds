name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: syntax check (hard gate)
        run: python -m compileall -q .
      - name: ruff (advisory)
        run: pipx run ruff check . || true
